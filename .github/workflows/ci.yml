name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- Python ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install flake8 pytest prometheus_client flask

      - name: Lint Python (STRICT)
        run: flake8 app/

      - name: Run unit tests
        run: pytest -q || true

      # ---------------- Helm ----------------
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/skybyte-app

      - name: Render Helm templates
        run: helm template test helm/skybyte-app > rendered.yaml

      # ---------------- Kubernetes validation ----------------
      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin

      - name: Validate manifests
        run: kubeconform -strict rendered.yaml

      # ---------------- Terraform ----------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      # ---------------- Docker ----------------
      - name: Build Docker image
        run: docker build -t skybyte/app:ci .

      # ---------------- Security scanning ----------------
      - name: Install Trivy
        run: |
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
          sudo mv ./bin/trivy /usr/local/bin/trivy
      - name: Scan filesystem
        run: trivy fs .

      - name: Scan Docker image
        run: trivy image skybyte/app:ci

      # ---------------- Kyverno policy test ----------------
      - name: Install Kyverno CLI
        run: |
          wget https://github.com/kyverno/kyverno/releases/download/v1.15.2/kyverno-cli_v1.15.2_linux_x86_64.tar.gz
          tar -xzf kyverno-cli_v1.15.2_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/
      - name: Validate policies against manifests
        run: kyverno apply policies/ -r rendered.yaml || true
