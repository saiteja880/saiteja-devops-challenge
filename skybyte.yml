apiVersion: v1
kind: Pod
metadata:
  name: debug
  namespace: devops-challenge
spec:
  containers:
  - name: curl
    image: curlimages/curl:latest
    command: ["sh", "-c", "sleep 3600"]
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
