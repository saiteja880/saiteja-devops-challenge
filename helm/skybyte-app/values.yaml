replicaCount: 1

image:
  repository: skybyte/app
  tag: v2
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

namespace: devops-challenge

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

terminationGracePeriodSeconds: 30
